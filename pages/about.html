<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>能力与联系 | 李民昊</title>
    <style>
      * { box-sizing: border-box; } html { scroll-behavior: smooth; }
      body { margin: 0; color: #f7f7fb; font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; background: radial-gradient(circle at 18% 8%, rgba(45,212,191,.14), transparent 28rem), radial-gradient(circle at 84% 16%, rgba(168,85,247,.16), transparent 30rem), #09090b; }
      a { color: inherit; text-decoration: none; }
      .wrap { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }
      .nav { position: fixed; inset: 0 0 auto; z-index: 50; border-bottom: 1px solid rgba(255,255,255,.1); background: rgba(9,9,11,.78); backdrop-filter: blur(22px); }
      .nav .wrap { min-height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
      .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; white-space: nowrap; }
      .logo { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 14px; background: #fff; color: #09090b; }
      .links { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; } .links::-webkit-scrollbar { display: none; }
      .links a { flex: 0 0 auto; padding: 10px 14px; border-radius: 999px; color: #d4d4d8; font-size: 14px; }
      .links a:hover { background: rgba(255,255,255,.1); color: #fff; }
      .glass { border: 1px solid rgba(255,255,255,.12); background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.045)); box-shadow: 0 24px 80px rgba(0,0,0,.38); backdrop-filter: blur(22px); }
      .kicker { color: #a5f3fc; letter-spacing: .28em; text-transform: uppercase; font-weight: 800; font-size: 13px; }
      .hero, .section { padding: 96px 0 44px; }
      .hero-card, .contact { border-radius: 30px; padding: clamp(24px, 4vw, 42px); }
      h1, h2 { margin: 12px 0 0; font-size: clamp(34px, 5vw, 58px); line-height: 1.1; }
      .desc { color: #a1a1aa; line-height: 1.8; font-size: 16px; max-width: 760px; }
      .skills { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 28px; }
      .skill, .step { border-radius: 22px; padding: 20px; }
      .skill p, .step p { color: #a1a1aa; line-height: 1.7; font-size: 14px; }
      .process { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; margin-top: 28px; }
      .num { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 999px; background: #fff; color: #09090b; font-weight: 900; }
      .contact { background: #fff; color: #09090b; }
      .contact .kicker, .contact p { color: #52525b; }
      .contact-lines { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-top: 24px; }
      .contact-lines b { overflow-wrap: anywhere; }
      @media (max-width: 980px) { .skills { grid-template-columns: repeat(2, minmax(0, 1fr)); } .process { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 760px) { .wrap { width: min(100% - 28px, 1180px); } .brand span:last-child { display: none; } .links a { padding: 8px 10px; font-size: 13px; } .skills, .process, .contact-lines { grid-template-columns: 1fr; } .hero { padding-top: 86px; } }
    </style>
  </head>
  <body>
    <header class="nav"><div class="wrap"><a class="brand" href="../index.html"><span class="logo">李</span><span>李民昊 Portfolio</span></a><nav class="links"><a href="../index.html">简历首页</a><a href="works.html">完整作品</a><a href="about.html">能力与联系</a></nav></div></header>
    <main>
      <section class="hero wrap"><div class="hero-card glass"><div class="kicker">Capabilities</div><h1>能力与工作方式</h1><p class="desc">这一页补充说明我能为团队带来的能力结构、工作流程和联系方式。首页负责快速建立印象，作品页负责展示案例，这里负责说明怎么落地。</p></div></section>
      <section class="section wrap"><div class="kicker">Skill Set</div><h2>能力介绍</h2><div class="skills" id="skills"></div></section>
      <section class="section wrap"><div class="kicker">Process</div><h2>工作流程</h2><div class="process" id="process"></div></section>
      <section class="section wrap"><div class="contact"><div class="kicker">Contact</div><h2>想了解我能为团队带来什么？</h2><p>欢迎通过邮箱联系我，也可以查看我的更多作品和简历。</p><div class="contact-lines"><b>邮箱：l15515479790@163.com</b><b>微信：15515479790</b><b>作品集：hh-portfolio.com</b></div></div></section>
    </main>
    <script>
      const skills = [['视觉设计','海报、封面、品牌视觉、文旅图鉴'], ['商业包装','产品卖点提炼、广告视觉、社媒传播'], ['短视频内容','Vlog 企划、视频封面、角色 IP 包装'], ['内容整理','作品分类、项目命名、面试表达'], ['AI 创作','AI 图片生成、视频生成、提示词优化、风格统一'], ['网页展示','单页作品集、响应式布局、动效设计']];
      document.getElementById('skills').innerHTML = skills.map(s => `<div class="skill glass"><b>${s[0]}</b><p>${s[1]}</p></div>`).join('');
      const steps = ['明确目标：根据面试岗位确定作品展示重点','整理作品：把作品分为清晰类型，提炼亮点','视觉包装：用统一风格提升作品集专业感','视频呈现：用封面、播放弹窗和案例说明展示动态内容','快速交付：生成可上线、可发送、可面试展示的网站'];
      document.getElementById('process').innerHTML = steps.map((s, i) => { const [title, text] = s.split('：'); return `<div class="step glass"><span class="num">${i + 1}</span><h3>${title}</h3><p>${text}</p></div>`; }).join('');
    </script>
  </body>
</html>
